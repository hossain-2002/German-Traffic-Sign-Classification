version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - MODEL_PATH=models/best_model.pth
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
